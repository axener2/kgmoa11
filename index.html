<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>KGMOA — Member Portal</title>
<meta name="description" content="KGMOA member portal demo: registration, OTP verification, member card, updates and directory.">
<style>
:root{--navy:#0E2B4D;--navy2:#173E69;--blue:#1E4D82;--gold:#C2A14D;--cream:#EEF1F5;--paper:#FAFBFD;--ink:#14202E;--muted:#5E6B79;--line:rgba(14,43,77,.12);--red:#B23B3B;--ok:#3F9D6B}*{box-sizing:border-box}html,body,#app{height:100%;margin:0}body{background:var(--cream);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink)}button,input{font:inherit}button{cursor:pointer}.phone{max-width:480px;margin:0 auto;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden}.scroll{flex:1;overflow:auto;scrollbar-width:none}.scroll::-webkit-scrollbar{display:none}.top{background:linear-gradient(165deg,var(--navy2),var(--navy));color:var(--cream);border-bottom-left-radius:26px;border-bottom-right-radius:26px;padding:42px 20px 26px;position:relative}.top:before{content:"";position:absolute;top:0;left:22px;right:22px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent)}.brand{display:flex;align-items:center;justify-content:center;gap:12px}.seal{width:42px;height:42px;border-radius:50%;border:1px solid rgba(194,161,77,.7);display:grid;place-items:center;color:#DBC189;font-family:Georgia,serif;letter-spacing:.05em;position:relative}.seal:after{content:"";position:absolute;inset:4px;border-radius:50%;border:1px solid rgba(194,161,77,.35)}.brand-title{font-family:Georgia,serif;font-size:23px;letter-spacing:.14em;line-height:1}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.smallcap{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}.card{background:var(--cream);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:0 20px 40px -28px rgba(14,43,77,.5)}.auth-card{margin:-20px 18px 28px}.tabs{display:flex;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:20px}.tabs div{flex:1;text-align:center;padding:10px 0;border-radius:9px;font-weight:700;font-size:13px;color:rgba(94,107,121,.6)}.tabs .active{background:linear-gradient(160deg,var(--navy2),var(--navy));color:var(--cream)}h1,h2,h3{font-family:Georgia,serif;font-weight:400;margin:0}.muted{color:var(--muted)}.field-label{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:0 0 7px}.field{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:14px}.field:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px rgba(194,161,77,.16)}.field input{border:0;outline:0;background:transparent;flex:1;min-width:0;color:var(--ink);font-size:15px}.icon{width:20px;text-align:center;color:var(--blue)}.btn{width:100%;border:0;border-radius:13px;padding:15px 0;background:linear-gradient(160deg,var(--navy2),var(--navy));color:var(--cream);font-weight:700;box-shadow:0 14px 26px -14px rgba(14,43,77,.8)}.btn:active,.lift:active{transform:scale(.985)}.err{color:var(--red);font-size:12px;margin:-9px 0 12px}.alert{display:flex;gap:9px;background:rgba(178,59,59,.07);border:1px solid rgba(178,59,59,.25);border-radius:12px;padding:11px 13px;color:var(--red);font-size:12.5px;line-height:1.45;margin-bottom:16px}.link{background:none;border:0;color:var(--blue);font-weight:700;padding:0;margin-bottom:14px}.otp{display:flex;gap:9px;margin:8px 0 12px}.otp input{width:100%;aspect-ratio:1;text-align:center;font-family:Georgia,serif;font-size:22px;border:1px solid var(--line);border-radius:12px;background:var(--paper);outline:0}.avatar{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;flex-shrink:0;font-family:Georgia,serif;background:linear-gradient(150deg,#234E80,var(--navy));color:var(--cream)}.avatar.gold{background:linear-gradient(150deg,#F5F7FA,#D2DBE6);color:var(--navy)}.member-card{margin:-38px 18px 0;border-radius:18px;padding:5px;background:linear-gradient(160deg,var(--navy2),var(--navy) 58%,#0A2243);box-shadow:0 18px 38px -18px rgba(14,43,77,.65);overflow:hidden;position:relative;color:var(--cream)}.member-card:after{content:"KG";position:absolute;right:-9px;bottom:-24px;font-family:Georgia,serif;font-size:86px;color:rgba(255,255,255,.05)}.member-inner{position:relative;z-index:1;border-radius:14px;border:1px solid rgba(255,255,255,.22);box-shadow:inset 0 0 0 4px rgba(14,43,77,.9),inset 0 0 0 5px rgba(255,255,255,.12);padding:16px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:18px 18px 4px}.quick{border:1px solid var(--line);background:var(--paper);border-radius:14px;padding:12px 4px;display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--ink);font-weight:700;font-size:12px}.qicon{width:38px;height:38px;border-radius:11px;background:rgba(14,43,77,.05);border:1px solid var(--line);display:grid;place-items:center}.section{display:flex;align-items:center;justify-content:space-between;padding:20px 18px 12px}.row-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:13px 15px;display:flex;gap:12px;align-items:flex-start}.list{padding:0 18px 22px;display:flex;flex-direction:column;gap:10px}.tag{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:99px}.title{padding:22px 20px 14px}.chips{display:flex;gap:8px;padding:0 18px 14px;overflow-x:auto;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}.chip{white-space:nowrap;padding:7px 14px;border-radius:99px;border:1px solid var(--line);background:transparent;color:var(--blue);font-weight:700;font-size:12.5px}.chip.active{background:var(--navy);color:var(--cream);border-color:var(--navy)}.directory{padding:10px 18px 22px;display:flex;flex-direction:column}.member-row{display:flex;align-items:center;gap:13px;padding:12px 4px;border:0;border-bottom:1px solid var(--line);background:transparent;text-align:left;width:100%}.profile-top{text-align:center}.detail{padding:10px 18px 0}.detail-row{display:flex;gap:13px;padding:12px 2px;border-bottom:1px solid var(--line);align-items:flex-start}.bottom{flex-shrink:0;background:var(--paper);border-top:1px solid var(--line);padding-bottom:6px}.nav{display:flex;padding:9px 8px 4px}.nav button{flex:1;border:0;background:transparent;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10px;font-weight:600}.nav button.active{color:var(--navy);font-weight:800}.fade{animation:fade .25s ease both}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}@media (prefers-reduced-motion:reduce){.fade{animation:none}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
'use strict';
const OTP_CODE='12345';
const doctors=[
{pen:'768414',name:'Dr Aswathy U R',phone:'9446168886',rank:'Assistant Surgeon',institution:'PHC Peruva',speciality:'MD Anaesthesia'},
{pen:'494012',name:'Dr Mammen P Cherian',phone:'9496357047',rank:'Assistant Surgeon',institution:'PHC Peruva',speciality:'—'},
{pen:'703547',name:'Dr Sreeja Raj',phone:'9446412850',rank:'Assistant Surgeon',institution:'PHC Velloor',speciality:'MD Forensic Medicine'},
{pen:'842312',name:'Dr Prasanth A M',phone:'9446157848',rank:'Assistant Surgeon',institution:'PHC Velloor',speciality:'MBA HM/HA'},
{pen:'629888',name:'Dr Sonia Scaria',phone:'9496356632',rank:'Assistant Surgeon',institution:'PHC Kattampak',speciality:'MD Community Medicine'},
{pen:'654017',name:'Dr Vijeesha Vijayan',phone:'9497754788',rank:'Assistant Surgeon',institution:'PHC Kattampak',speciality:'Diploma Obs & Gyn'},
{pen:'364986',name:'Dr Sapna G I',phone:'9400633816',rank:'Civil Surgeon',institution:'CHC Arunoottimangalam',speciality:'—'},
{pen:'484202',name:'Dr Binasha Sreedhar',phone:'9961372368',rank:'Assistant Surgeon',institution:'CHC Arunoottimangalam',speciality:'—'},
{pen:'891981',name:'Dr Lijomon T K',phone:'9496345552',rank:'Assistant Surgeon',institution:'CHC Arunoottimangalam',speciality:'MS Orthopaedics'},
{pen:'442387',name:'Dr Mini A S',phone:'9446384158',rank:'Civil Surgeon',institution:'PHC Athirampuzha',speciality:'—'},
{pen:'732231',name:'Dr Nissi K J',phone:'9496131906',rank:'Assistant Surgeon',institution:'PHC Athirampuzha',speciality:'MD Pharmacology'},
{pen:'795893',name:'Dr Asha Sukumaran',phone:'9074144039',rank:'Assistant Surgeon',institution:'PHC Athirampuzha',speciality:'MD Paediatrics'},
{pen:'859234',name:'Dr Jabin Jose',phone:'7736125269',rank:'Assistant Surgeon',institution:'PHC Athirampuzha',speciality:'—'},
{pen:'704808',name:'Dr Vineetha T S',phone:'9496565370',rank:'Assistant Surgeon',institution:'PHC Aymanam',speciality:'—'},
{pen:'693128',name:'Dr Anush S Kudakasseril',phone:'9446265764',rank:'Assistant Surgeon',institution:'PHC Aymanam',speciality:'MD Paediatrics'},
{pen:'997006',name:'Dr Harshith S',phone:'9400000000',rank:'Assistant Surgeon',institution:'PHC Aymanam',speciality:'—'},
{pen:'935628',name:'Dr Sherin Maria Augustain',phone:'9495910955',rank:'Assistant Surgeon',institution:'PHC Onamthuruthu',speciality:'MS ENT'},
{pen:'587322',name:'Dr Linto Lazar',phone:'9447766689',rank:'Assistant Surgeon',institution:'PHC Onamthuruthu',speciality:'—'}];
const updates=[
{type:'Circular',title:'DA arrears — third installment release',meta:'GO(Rt) No. 2148/2026/Fin',date:'12 Jun 2026',unread:true},
{type:'Event',title:'Annual Conference 2026',meta:'02 Aug · Registration open',date:'11 Jun 2026',unread:true},
{type:'Circular',title:'Revised transfer & posting norms, 2026',meta:'GO(P) No. 87/2026/H&FWD',date:'09 Jun 2026'},
{type:'Welfare',title:'Medical welfare fund — new claim portal live',meta:'Claims now filed online',date:'06 Jun 2026'},
{type:'Circular',title:'Pay revision arrears — option submission',meta:'Last date 30 Jun 2026',date:'02 Jun 2026'}];
let state={auth:'register',form:{name:'',pen:'',phone:''},me:null,tab:'home',filter:'All',member:null,err:{},otp:'',rejected:false};
const $=id=>document.getElementById(id); const app=$('app');
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function initials(n){let a=String(n).replace(/^Dr\.?\s*/i,'').trim().split(/\s+/);return ((a[0]?.[0]||'')+(a[1]?.[0]||'')).toUpperCase();}
function avatar(n,g=false,sz=44){return `<div class="avatar ${g?'gold':''}" style="width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.36)}px">${esc(initials(n))}</div>`}
function brand(){return `<div class="top"><div class="brand"><div class="seal">KG</div><div><div class="brand-title">KGMOA</div><div class="mono" style="font-size:8px;letter-spacing:.16em;color:#DBC189;margin-top:5px">MEMBER PORTAL</div></div></div><div style="font-size:11.5px;color:rgba(238,241,245,.65);text-align:center;margin-top:12px">Kerala Govt. Medical Officers' Association</div></div>`}
function field(k,label,icon,ph,type='text'){let e=state.err[k];return `<div class="field-label">${label}</div><div class="field" style="border-color:${e?'var(--red)':'var(--line)'}"><span class="icon">${icon}</span><input id="f_${k}" type="${type}" value="${esc(state.form[k])}" placeholder="${ph}" ${type==='tel'||k==='pen'?'inputmode="numeric"':''}></div>${e?`<div class="err">${esc(e)}</div>`:''}`}
function authScreen(){let body=''; if(state.auth==='register') body=register(); if(state.auth==='otp') body=otp(); if(state.auth==='confirm') body=confirm(); return `<div class="phone"><div class="scroll">${brand()}<div class="auth-card card"><div class="tabs"><div>Sign in</div><div class="active">Register</div></div>${body}</div><div style="text-align:center;font-size:11.5px;color:var(--muted);margin-top:-12px">🛡 Members-only portal · verified access</div></div></div>`}
function register(){return `<div class="fade"><h2 style="font-size:22px">Create your account</h2><div class="muted" style="font-size:12.5px;margin:3px 0 18px">For serving government medical officers</div>${field('name','Full name','👤','Enter your full name')}${field('pen','PEN number','#','Enter your PEN number')}${field('phone','Mobile','☎','Enter your mobile number','tel')}${state.rejected?`<div class="alert">ⓘ <span>Your PEN number and mobile number don't match our member records. Please check both and try again.</span></div>`:''}<button class="btn" id="continueBtn">Continue →</button><div style="display:flex;gap:8px;text-align:center;justify-content:center;margin-top:14px;font-size:11.5px;color:var(--muted)">🛡 Only pre-approved members can register.</div></div>`}
function otp(){return `<div class="fade"><button class="link" id="backReg">‹ Back</button><h2 style="font-size:22px">Verify your mobile</h2><div class="muted" style="font-size:12.5px;line-height:1.5;margin:3px 0 16px">Enter the OTP sent to +91 ${esc(state.form.phone)}. Demo OTP: <b>12345</b></div><div class="otp">${[0,1,2,3,4].map(i=>`<input maxlength="1" inputmode="numeric" value="${esc(state.otp[i]||'')}" data-otp="${i}">`).join('')}</div>${state.err.otp?`<div class="err" style="margin-top:0">${esc(state.err.otp)}</div>`:''}<button class="btn" id="verifyBtn">Verify →</button><div style="text-align:center;margin-top:14px;font-size:12px;color:var(--muted)">Didn't get a code? <b style="color:var(--blue)">Resend</b></div></div>`}
function confirm(){let r=state.record;return `<div class="fade"><button class="link" id="backOtp">‹ Back</button><div style="display:flex;gap:8px;align-items:center;margin-bottom:4px"><span style="width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:rgba(63,157,107,.12);color:var(--ok)">✓</span><h2 style="font-size:21px">Confirm your details</h2></div><div class="muted" style="font-size:12.5px;line-height:1.5;margin:2px 0 16px">We found your record in the association register.</div><div class="row-card" style="align-items:center;margin-bottom:12px">${avatar(r.name,true,48)}<div><h3 style="font-size:18px">${esc(r.name)}</h3><div class="muted" style="font-size:12px">${esc(r.rank)}</div></div></div><div class="row-card" style="display:block;margin-bottom:18px">${detailLine('#','PEN number',r.pen,true)}${detailLine('⚕','Rank',r.rank)}${detailLine('🏥','Institution',r.institution)}${detailLine('✎','Speciality',r.speciality==='—'?'Not on record':r.speciality)}${detailLine('☎','Mobile','+91 '+r.phone,false,true)}</div><button class="btn" id="confirmBtn">Confirm & continue →</button></div>`}
function detailLine(ic,k,v,mono=false,last=false){return `<div style="display:flex;gap:12px;padding:12px 0;${last?'':'border-bottom:1px solid var(--line)'}"><span style="color:var(--gold);width:18px">${ic}</span><div><div class="smallcap" style="font-size:9.5px">${k}</div><div class="${mono?'mono':''}" style="font-size:14px;margin-top:2px">${esc(v)}</div></div></div>`}
function mainScreen(){return `<div class="phone"><div class="scroll" id="scrollArea">${state.member?profile(state.member,false):content()}</div>${nav()}</div>`}
function content(){if(state.tab==='home')return home(); if(state.tab==='updates')return updatesScreen(); if(state.tab==='directory')return directory(); return profile(state.me,true)}
function home(){let m=state.me;return `<div class="fade"><div class="top" style="padding:44px 20px 56px"><div style="display:flex;justify-content:space-between;align-items:center"><div class="brand" style="justify-content:flex-start"><div class="seal">KG</div><div><div class="brand-title" style="font-size:20px">KGMOA</div><div class="mono" style="font-size:8px;color:rgba(238,241,245,.65);letter-spacing:.1em;margin-top:4px">MEMBER PORTAL</div></div></div><button style="width:38px;height:38px;border-radius:11px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:white">🔔</button></div><div style="margin-top:20px"><div class="mono" style="font-size:10.5px;letter-spacing:.14em;color:rgba(238,241,245,.68)">നമസ്കാരം · WELCOME</div><h1 style="font-size:23px;margin-top:5px">${esc(m.name)}</h1><div style="font-size:12.5px;color:rgba(244,238,225,.65);margin-top:2px">${esc(m.rank)}</div></div></div>${memberCard(m)}<div class="grid3"><button class="quick" data-tab="updates"><span class="qicon">📄</span>Circulars</button><button class="quick" data-tab="directory"><span class="qicon">👥</span>Directory</button><button class="quick" data-tab="updates"><span class="qicon">📅</span>Events</button></div><div class="section"><div class="smallcap" style="color:var(--blue)">Latest updates</div><button class="link" data-tab="updates" style="margin:0">View all ↗</button></div><div class="list">${updates.slice(0,2).map(updateRow).join('')}</div><div class="section"><div class="smallcap">Upcoming</div></div><div class="list"><div class="row-card" style="align-items:center"><div style="width:52px;height:56px;border-radius:12px;background:linear-gradient(160deg,var(--navy2),var(--navy));color:white;display:grid;place-items:center"><div><div class="mono" style="font-size:9px;color:rgba(255,255,255,.7)">AUG</div><div style="font-family:Georgia,serif;font-size:22px">02</div></div></div><div style="flex:1"><h3 style="font-size:16px">Annual Conference 2026</h3><div class="muted" style="font-size:12px;margin-top:3px">📍 Venue to be announced · 02 Aug</div></div><span class="muted">›</span></div></div></div>`}
function memberCard(m){return `<div class="member-card"><div class="member-inner"><div style="display:flex;justify-content:space-between"><div><div style="font-family:Georgia,serif;font-size:19px;letter-spacing:.04em">KGMOA</div><div class="mono" style="font-size:8.5px;letter-spacing:.18em;color:rgba(238,241,245,.6)">MEMBERSHIP · ESTD 1965</div></div><div class="seal" style="width:34px;height:34px">KG</div></div><div style="display:flex;gap:14px;align-items:center;margin-top:18px">${avatar(m.name,true,52)}<div><h3 style="font-size:19px;color:white;line-height:1.1">${esc(m.name)}</h3><div style="font-size:12.5px;color:rgba(244,238,225,.72);margin-top:3px">${esc(m.rank)} · ${esc(m.institution)}</div></div></div><div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:18px;padding-top:13px;border-top:1px solid rgba(255,255,255,.16)"><div><div class="mono" style="font-size:8.5px;color:rgba(244,238,225,.5);letter-spacing:.16em">PEN</div><div class="mono" style="font-size:13px;margin-top:3px">${esc(m.pen)}</div></div><div style="text-align:right"><div class="mono" style="font-size:8.5px;color:rgba(244,238,225,.5);letter-spacing:.16em">VALID THROUGH</div><div class="mono" style="font-size:13px;margin-top:3px">● Mar 2027</div></div></div></div></div>`}
function updateRow(u){let colors={Circular:['rgba(14,43,77,.07)','var(--navy)'],Event:['rgba(30,77,130,.12)','var(--blue)'],Welfare:['rgba(178,59,59,.10)','var(--red)']};let c=colors[u.type];return `<div class="row-card lift"><div style="flex:1"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span class="tag" style="background:${c[0]};color:${c[1]}">${u.type}</span>${u.unread?'<span style="width:6px;height:6px;border-radius:50%;background:var(--gold)"></span>':''}</div><div style="font-size:14px;font-weight:700;line-height:1.3">${esc(u.title)}</div><div class="mono muted" style="font-size:11px;margin-top:5px">${esc(u.date)} · ${esc(u.meta)}</div></div><span class="muted">›</span></div>`}
function updatesScreen(){let tabs=['All','Circular','Event','Welfare'];let list=state.filter==='All'?updates:updates.filter(u=>u.type===state.filter);return `<div class="fade"><div class="title"><h1 style="font-size:27px">Updates</h1><div class="muted" style="font-size:12.5px;margin-top:2px">Circulars, events & welfare notices</div></div><div class="chips">${tabs.map(t=>`<button class="chip ${state.filter===t?'active':''}" data-filter="${t}">${t==='All'?'All':t+'s'}</button>`).join('')}</div><div class="list">${list.map(updateRow).join('')}</div></div>`}
function directory(){let q=state.q||'';let list=doctors.filter(m=>(m.name+m.rank+m.institution).toLowerCase().includes(q.toLowerCase()));return `<div class="fade"><div class="title"><h1 style="font-size:27px">Directory</h1><div class="muted" style="font-size:12.5px;margin-top:2px">${doctors.length} members</div></div><div style="padding:0 18px"><div class="field" style="margin:0"><span class="icon">🔍</span><input id="searchBox" value="${esc(q)}" placeholder="Search name, rank, institution"></div></div><div class="directory">${list.map(m=>`<button class="member-row" data-member="${m.pen}">${avatar(m.name,false,42)}<div style="flex:1;min-width:0"><div style="font-size:14.5px;font-weight:700">${esc(m.name)}</div><div class="muted" style="font-size:12px;margin-top:1px">${esc(m.rank)} · ${esc(m.institution)}</div></div><span class="muted">›</span></button>`).join('')||'<div class="muted" style="text-align:center;padding:40px 0;font-size:13.5px">No members match that search.</div>'}</div></div>`}
function profile(m,self){let spec=m.speciality&&m.speciality!=='—'?m.speciality:'Not on record';return `<div class="fade"><div class="top profile-top" style="padding:26px 20px 30px">${!self?'<button id="backMember" style="position:absolute;left:14px;top:14px;width:34px;height:34px;border-radius:10px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:white">‹</button>':''}<div style="display:flex;justify-content:center;margin-bottom:12px">${avatar(m.name,true,76)}</div><h1 style="font-size:23px">${esc(m.name)}</h1><div style="font-size:13px;color:rgba(238,241,245,.7);margin-top:3px">${esc(m.rank)} · ${esc(m.institution)}</div><div style="display:inline-flex;gap:6px;margin-top:12px;padding:5px 12px;border-radius:99px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08)" class="mono">✓ PEN ${esc(m.pen)}</div></div><div style="padding:18px 18px 0"><div class="smallcap">Service details</div></div><div class="detail">${detailLine('⚕','Rank',m.rank)}${detailLine('🏥','Institution',m.institution)}${detailLine('✎','Speciality',spec)}${detailLine('#','PEN number',m.pen,true,true)}</div><div style="padding:18px 18px 0"><div class="smallcap">Contact</div></div><div class="detail">${detailLine('☎','Phone','+91 '+m.phone)}${detailLine('✉','Email',initials(m.name).toLowerCase()+'.'+m.pen+'@kgmoa.in',false,true)}</div>${self?`<div style="padding:18px 18px 0"><div class="smallcap">Account</div></div><div class="detail">${['Edit institution & posting','Notifications','Privacy','Help & support','Sign out'].map((t,i)=>`<div class="detail-row" style="${i===4?'border-bottom:0;color:var(--red)':''}"><span>${i===0?'🏥':i===1?'🔔':i===2?'🛡':i===3?'?':'↩'}</span><div style="flex:1;font-size:14px">${t}</div>${i<4?'<span class="muted">›</span>':''}</div>`).join('')}</div>`:`<div style="padding:14px 18px 24px;display:flex;gap:10px"><a href="tel:+91${esc(m.phone)}" class="btn" style="text-decoration:none;text-align:center">☎ Call</a><a href="mailto:${esc(initials(m.name).toLowerCase()+'.'+m.pen+'@kgmoa.in')}" class="btn" style="text-decoration:none;text-align:center;background:var(--paper);color:var(--navy);border:1px solid var(--line);box-shadow:none">✉ Message</a></div>`}</div>`}
function nav(){let navs=[['home','⌂','Home'],['updates','📣','Updates'],['directory','👥','Directory'],['profile','👤','Profile']];return `<div class="bottom"><div class="nav">${navs.map(n=>`<button data-nav="${n[0]}" class="${state.tab===n[0]&&!state.member?'active':''}"><span style="font-size:20px">${n[1]}</span><span>${n[2]}</span><span style="width:4px;height:4px;border-radius:50%;background:${state.tab===n[0]&&!state.member?'var(--gold)':'transparent'}"></span></button>`).join('')}</div></div>`}
function validate(){let e={};let pen=state.form.pen.trim(), phone=state.form.phone.replace(/\D/g,''); if(!state.form.name.trim()) e.name='Enter your name'; if(!/^\d{4,8}$/.test(pen)) e.pen='Enter a valid PEN number'; if(!/^\d{10}$/.test(phone)) e.phone='Enter a valid 10-digit mobile number'; state.err=e; if(Object.keys(e).length)return; let r=doctors.find(d=>d.pen===pen&&d.phone===phone); if(!r){state.rejected=true;return} state.record=r; state.auth='otp'; state.rejected=false; state.otp=''; state.err={};}
function bind(){document.querySelectorAll('[id^=f_]').forEach(inp=>inp.oninput=e=>{state.form[inp.id.slice(2)]=e.target.value;state.rejected=false}); $('continueBtn')&&($('continueBtn').onclick=()=>{validate();render()}); $('backReg')&&($('backReg').onclick=()=>{state.auth='register';state.err={};render()}); $('backOtp')&&($('backOtp').onclick=()=>{state.auth='otp';state.err={};render()}); document.querySelectorAll('[data-otp]').forEach(inp=>inp.oninput=e=>{let i=+inp.dataset.otp,v=e.target.value.replace(/\D/g,'').slice(-1);let a=state.otp.split('');a[i]=v;state.otp=a.join('');state.err={};render();let next=document.querySelector(`[data-otp="${i+1}"]`); if(v&&next)next.focus();}); $('verifyBtn')&&($('verifyBtn').onclick=()=>{if(state.otp===OTP_CODE){state.auth='confirm';state.err={};}else state.err={otp:'Incorrect code. Please try again.'};render()}); $('confirmBtn')&&($('confirmBtn').onclick=()=>{state.me={...state.record};state.tab='home';state.member=null;render()}); document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;state.member=null;render()}); document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.nav;state.member=null;render()}); document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{state.filter=b.dataset.filter;render()}); $('searchBox')&&($('searchBox').oninput=e=>{state.q=e.target.value;render()}); document.querySelectorAll('[data-member]').forEach(b=>b.onclick=()=>{state.member=doctors.find(d=>d.pen===b.dataset.member);render()}); $('backMember')&&($('backMember').onclick=()=>{state.member=null;render()});}
function render(){app.innerHTML=state.me?mainScreen():authScreen();bind();}
try{render()}catch(err){app.innerHTML='<div style="padding:30px;font-family:system-ui;color:#B23B3B">App failed to load: '+esc(err.message||err)+'</div>';console.error(err)}
})();
</script>
</body>
</html>
